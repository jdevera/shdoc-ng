version: 2

builds:
  - main: ./cmd/shdoc-ng
    binary: shdoc-ng
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

nfpms:
  - package_name: shdoc-ng
    homepage: "https://github.com/jdevera/shdoc-ng"
    maintainer: "Jacobo de Vera <devel@jacobodevera.com>"
    description: "Documentation generator for shell scripts"
    license: "MIT"
    formats:
      - deb
      - rpm
      - apk

brews:
  - repository:
      owner: jdevera
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/jdevera/shdoc-ng"
    description: "Documentation generator for shell scripts"
    license: "MIT"
    install: |
      bin.install "shdoc-ng"
    test: |
      system "#{bin}/shdoc-ng", "--version"

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^refactor:"
