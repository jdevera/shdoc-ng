repos:
  - repo: https://github.com/tekwizely/pre-commit-golang
    rev: v1.0.0-rc.4
    hooks:
      - id: go-build-repo-mod
      - id: go-test-repo-mod
      - id: go-vet-repo-mod
      - id: golangci-lint-repo-mod
      - id: go-mod-tidy-repo
  - repo: local
    hooks:
      - id: regenerate-showcase
        name: regenerate-showcase
        language: system
        entry: scripts/regenerate-showcase.sh
        files: ^examples/showcase\.sh$
        pass_filenames: false
      - id: vscode-extension-build
        name: vscode-extension-build
        language: system
        entry: bash -c 'cd editors/vscode && npm ci --silent && npm run compile'
        files: ^editors/vscode/
        pass_filenames: false
